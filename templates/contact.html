
{% load static %}
<!DOCTYPE html>
<html>
<head>

<title>Contact Page</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

{% load static %}
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5 mb-5 pb-5 bg-warning bg-opacity-50 p-4 rounded shadow-sm">

<nav class="d-flex justify-content-end mb-4">

<a href="{% url 'home' %}" class="me-3 link-success">Home</a>
<a href="{% url 'nutrients' %}" class="me-3 link-danger" >Nutrients</a>
<a href="{% url 'contact' %}" class="me-3 link-primary">Contact</a>
</nav>

<h2 class="text-center mb-4">Contact Us</h2>

<form id="contactForm" class="mb-5" method="POST">
    {% csrf_token %}

<div class="mb-3">
<label class="form-label">Name</label>
<input type="text" id="name" name="name" class="form-control" placeholder="Enter your name">
</div>

<div class="mb-3">
<label class="form-label">Email</label>
<input type="email" id="email" name="email" class="form-control" placeholder="Enter your email">
</div>

<div class="mb-3">
<label class="form-label">Message</label>
<textarea id="message" name="message" class="form-control" rows="4"></textarea>
</div>

<button type="submit" class="btn btn-primary">Send</button>

</form>

<div id="successMsg" class="mt-3"></div>


</div>

</body>
